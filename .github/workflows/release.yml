name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o gofsaas-linux-amd64 ./cmd/gofsaas
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o gofsaas-linux-arm64 ./cmd/gofsaas

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gofsaas-linux-amd64
            gofsaas-linux-arm64
