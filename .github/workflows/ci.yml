name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install FUSE development headers
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3

      - name: Vet
        run: go vet ./...

      - name: Test fakes (validates test infrastructure first)
        run: go test ./pkg/fakes/... -v -race

      - name: Test all packages
        run: go test ./... -v -race

      - name: Build
        run: go build ./...
